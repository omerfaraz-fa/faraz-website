<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Connections -->
  <g stroke="#000000" stroke-width="12" stroke-linecap="round">
    <line x1="100" y1="66" x2="100" y2="30" />
    <line x1="70.5552" y1="83" x2="39.3782" y2="65" />
    <line x1="129.4448" y1="83" x2="160.6218" y2="65" />
    <line x1="100" y1="134" x2="100" y2="170" />
  </g>

  <!-- Solid Nodes -->
  <g fill="#000000">
    <!-- Central Processing Core -->
    <circle cx="100" cy="100" r="12" />
    
    <!-- Fragmented Input Nodes -->
    <circle cx="100" cy="30" r="16" />
    <circle cx="39.3782" cy="65" r="16" />
    <circle cx="160.6218" cy="65" r="16" />
    
    <!-- Unified Output Node -->
    <circle cx="100" cy="170" r="24" />
  </g>

  <!-- Central Platform Hub (Ring) -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#000000" stroke-width="12" />
</svg>
